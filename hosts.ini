# Ansible Inventory for Ecommerce J2EE Application Deployments

[staging]
# Target staging application server
staging-app-01 ansible_host=192.168.50.10 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa_deploy

[production]
# Target production application servers
prod-app-01 ansible_host=10.0.100.20 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa_deploy
prod-app-02 ansible_host=10.0.100.21 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa_deploy

[ecommerce_servers:children]
staging
production

[ecommerce_servers:vars]
# Common connection variables
ansible_connection=ssh
ansible_port=22
# Escalation settings
ansible_become=true
ansible_become_method=sudo
ansible_become_user=root
