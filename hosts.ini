# Local Single-Server Ansible Inventory

[jenkins]
localhost ansible_connection=local

[sonarqube]
localhost ansible_connection=local

[staging]
localhost ansible_connection=local

[production]
# In a single-server setup, production also points locally
localhost ansible_connection=local

[ecommerce_servers:children]
staging
production

[devops_stack:children]
jenkins
sonarqube
ecommerce_servers

[devops_stack:vars]
# Connection override to run everything on the local server
ansible_connection=local

# Escalation settings to allow package installations
ansible_become=true
ansible_become_method=sudo
ansible_become_user=root

# Overrides for single-server J2EE deploy
tomcat_service=tomcat
tomcat_webapps_dir=/usr/local/tomcat/webapps
tomcat_owner=tomcat
tomcat_group=tomcat
backup_dir=/usr/local/tomcat/backups
app_port=8082
health_check_url=http://localhost:8082/EcommerceApp/