---
# ==============================================================================
# PLAY 1: PROVISION JENKINS
# ==============================================================================
- name: Provision Jenkins Server
  hosts: jenkins
  become: yes

  tasks:
    - name: Install Jenkins dependencies
      yum:
        name:
          - java-21-amazon-corretto-devel
          - java-17-amazon-corretto-devel
          - java-11-amazon-corretto-devel
          - git
          - maven
          - wget
          - unzip
        state: present

    - name: Download Jenkins RedHat repository file
      get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo
        owner: root
        group: root
        mode: '0644'

    - name: Import Jenkins GPG key
      rpm_key:
        state: present
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

    - name: Install Jenkins
      yum:
        name: jenkins
        state: present

    - name: Force Jenkins to use Java 21
      copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        content: |
          [Service]
          Environment="JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto.x86_64"
          Environment="JENKINS_JAVA_CMD=/usr/lib/jvm/java-21-amazon-corretto.x86_64/bin/java"

    - name: Start and enable Jenkins service
      systemd:
        name: jenkins
        daemon_reload: yes
        state: started
        enabled: yes

    - name: Output Jenkins initial password path
      debug:
        msg: "Jenkins password: sudo cat /var/lib/jenkins/secrets/initialAdminPassword"

# ==============================================================================
# PLAY 2: PROVISION SONARQUBE
# ==============================================================================
- name: Provision SonarQube Server
  hosts: sonarqube
  become: yes

  tasks:
    - name: Configure kernel parameters for Elasticsearch
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: 'vm.max_map_count', value: '524288' }
        - { name: 'fs.file-max', value: '131072' }

    - name: Install SonarQube dependencies
      yum:
        name:
          - java-17-amazon-corretto-devel
          - unzip
          - wget
        state: present

    - name: Create sonar group
      group:
        name: sonar
        state: present

    - name: Create sonar user
      user:
        name: sonar
        group: sonar
        system: yes
        home: /home/sonar
        shell: /bin/bash

    - name: Download SonarQube
      get_url:
        url: https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-10.4.1.88267.zip
        dest: /tmp/sonarqube.zip

    - name: Remove old SonarQube directory
      file:
        path: /opt/sonarqube
        state: absent

    - name: Remove old extracted SonarQube directory
      file:
        path: /opt/sonarqube-10.4.1.88267
        state: absent

    - name: Extract SonarQube
      unarchive:
        src: /tmp/sonarqube.zip
        dest: /opt/
        remote_src: yes
        owner: sonar
        group: sonar

    - name: Rename SonarQube directory
      command: mv /opt/sonarqube-10.4.1.88267 /opt/sonarqube
      args:
        creates: /opt/sonarqube/bin/linux-x86-64/sonar.sh

    - name: Set SonarQube permissions
      file:
        path: /opt/sonarqube
        state: directory
        owner: sonar
        group: sonar
        recurse: yes

    - name: Create SonarQube systemd service
      copy:
        dest: /etc/systemd/system/sonarqube.service
        content: |
          [Unit]
          Description=SonarQube service
          After=syslog.target network.target

          [Service]
          Type=forking
          User=sonar
          Group=sonar
          Environment="JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto.x86_64"
          Environment="SONAR_JAVA_PATH=/usr/lib/jvm/java-17-amazon-corretto.x86_64/bin/java"
          ExecStart=/opt/sonarqube/bin/linux-x86-64/sonar.sh start
          ExecStop=/opt/sonarqube/bin/linux-x86-64/sonar.sh stop
          Restart=on-failure
          LimitNOFILE=65536
          LimitNPROC=4096

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable SonarQube
      systemd:
        name: sonarqube
        daemon_reload: yes
        state: started
        enabled: yes

# ==============================================================================
# PLAY 3: PROVISION TOMCAT
# ==============================================================================
- name: Provision Tomcat Application Server
  hosts: tomcat
  become: yes

  tasks:
    - name: Install Tomcat dependencies
      yum:
        name:
          - java-11-amazon-corretto-devel
          - wget
        state: present

    - name: Create tomcat group
      group:
        name: tomcat
        state: present

    - name: Create tomcat user
      user:
        name: tomcat
        group: tomcat
        home: /usr/local/tomcat
        shell: /bin/false

    - name: Download Apache Tomcat 9
      get_url:
        url: https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.83/bin/apache-tomcat-9.0.83.tar.gz
        dest: /tmp/tomcat.tar.gz

    - name: Remove old Tomcat directory
      file:
        path: /usr/local/tomcat
        state: absent

    - name: Create Tomcat installation directory
      file:
        path: /usr/local/tomcat
        state: directory
        owner: tomcat
        group: tomcat

    - name: Extract Tomcat archive
      unarchive:
        src: /tmp/tomcat.tar.gz
        dest: /usr/local/tomcat
        remote_src: yes
        extra_opts: [--strip-components=1]
        owner: tomcat
        group: tomcat

    - name: Change Tomcat HTTP port to 8082
      replace:
        path: /usr/local/tomcat/conf/server.xml
        regexp: 'Connector port="8080"'
        replace: 'Connector port="8082"'

    - name: Configure Tomcat manager access
      copy:
        dest: "{{ item }}"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <Context antiResourceLocking="false" privileged="true" >
            <CookieProcessor className="org.apache.tomcat.util.http.Rfc6265CookieProcessor"
                             sameSiteCookies="strict" />
          </Context>
        owner: tomcat
        group: tomcat
      loop:
        - /usr/local/tomcat/webapps/manager/META-INF/context.xml
        - /usr/local/tomcat/webapps/host-manager/META-INF/context.xml

    - name: Configure Tomcat users
      copy:
        dest: /usr/local/tomcat/conf/tomcat-users.xml
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <tomcat-users xmlns="http://tomcat.apache.org/xml"
                        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                        xsi:schemaLocation="http://tomcat.apache.org/xml tomcat-users.xsd"
                        version="1.0">
            <role rolename="manager-gui"/>
            <role rolename="manager-script"/>
            <role rolename="admin-gui"/>
            <user username="tomcat" password="s3cretpassword" roles="manager-gui,manager-script,admin-gui"/>
          </tomcat-users>
        owner: tomcat
        group: tomcat

    - name: Set Tomcat permissions
      file:
        path: /usr/local/tomcat
        owner: tomcat
        group: tomcat
        recurse: yes

    - name: Make Tomcat scripts executable
      shell: chmod +x /usr/local/tomcat/bin/*.sh

    - name: Configure Tomcat systemd service
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat Web Application Container
          After=syslog.target network.target

          [Service]
          Type=forking
          Environment=JAVA_HOME=/usr/lib/jvm/java-11-amazon-corretto.x86_64
          Environment=CATALINA_PID=/usr/local/tomcat/temp/tomcat.pid
          Environment=CATALINA_HOME=/usr/local/tomcat
          Environment=CATALINA_BASE=/usr/local/tomcat
          ExecStart=/usr/local/tomcat/bin/startup.sh
          ExecStop=/usr/local/tomcat/bin/shutdown.sh
          User=tomcat
          Group=tomcat
          UMask=0007
          RestartSec=10
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Tomcat
      systemd:
        name: tomcat
        daemon_reload: yes
        state: started
        enabled: yes
