---
- name: Deploy Ecommerce J2EE Application to Tomcat
  hosts: ecommerce_servers
  become: "{{ ansible_become | default(false) }}"

  vars:
    tomcat_service: dummy
    tomcat_webapps_dir: /usr/local/tomcat/webapps
    tomcat_owner: root
    tomcat_group: root
    app_name: EcommerceApp
    artifact_src_path: "./EcommerceApp/target/{{ app_name }}.war"
    backup_dir: /usr/local/tomcat/backups
    app_port: 8080
    health_check_url: "http://localhost:8080/{{ app_name }}/"
    health_check_timeout: 60

  tasks:
    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: "{{ tomcat_owner }}"
        group: "{{ tomcat_group }}"
        mode: '0755'

    - name: Check if current application deployment exists
      stat:
        path: "{{ tomcat_webapps_dir }}/{{ app_name }}.war"
      register: current_war

    - name: Backup existing artifact
      copy:
        src: "{{ tomcat_webapps_dir }}/{{ app_name }}.war"
        dest: "{{ backup_dir }}/{{ app_name }}.war.bak"
        remote_src: yes
        owner: "{{ tomcat_owner }}"
        group: "{{ tomcat_group }}"
        mode: '0644'
      when: current_war.stat.exists
      register: backup_completed

    - name: Remove existing deployment files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ tomcat_webapps_dir }}/{{ app_name }}.war"
        - "{{ tomcat_webapps_dir }}/{{ app_name }}"

    - name: Deploy new WAR artifact
      copy:
        src: "{{ artifact_src_path }}"
        dest: "{{ tomcat_webapps_dir }}/{{ app_name }}.war"
        owner: "{{ tomcat_owner }}"
        group: "{{ tomcat_group }}"
        mode: '0644'

    - name: Wait for application to expand and initialize
      uri:
        url: "{{ health_check_url }}"
        status_code: 200
      register: app_status
      until: app_status.status == 200
      retries: 10
      delay: 6
      ignore_errors: yes

    - name: Fail if application health check failed
      fail:
        msg: "Deployment failed. Application health check did not return 200."
      when: app_status.status != 200