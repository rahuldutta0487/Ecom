# SonarQube Scanner Configuration for EcommerceApp
# Required metadata
sonar.projectKey=com.ecommerce:EcommerceApp
sonar.projectName=EcommerceApp
sonar.projectVersion=1.0.0-SNAPSHOT

# Path to source directories (relative to project root)
sonar.sources=src/main/java,src/main/webapp

# Exclude libraries and web dependencies from analysis if needed
sonar.exclusions=src/main/webapp/WEB-INF/lib/**,src/main/webapp/images/**

# Path to compiled Java classes (required by SonarQube for Java analysis)
sonar.java.binaries=target/classes

# Source encoding
sonar.sourceEncoding=UTF-8

# Quality Gate Settings
# Note: Fail build if quality gate fails (managed via Jenkins pipeline stage)
sonar.qualitygate.wait=true
