---
- name: Install and Configure Jenkins (CI/CD Server)
  hosts: jenkins
  become: yes

  vars:
    java_package: openjdk-11-jdk
    maven_package: maven
    jenkins_port: 8080

  tasks:
    - name: Update apt repository cache
      apt:
        update_cache: yes

    - name: Install Java JDK 11 and base utilities
      apt:
        name:
          - "{{ java_package }}"
          - curl
          - wget
          - gnupg
          - git
          - software-properties-common
        state: present

    - name: Install Maven
      apt:
        name: "{{ maven_package }}"
        state: present

    - name: Install Ansible on CI/CD Server (to execute deployment playbooks)
      apt:
        name:
          - ansible
          - sshpass
          - openssh-client
        state: present

    - name: Import Jenkins GPG repository key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        state: present

    - name: Add Jenkins repository source list
      apt_repository:
        repo: deb https://pkg.jenkins.io/debian-stable binary/
        state: present
        filename: jenkins

    - name: Update apt cache after adding Jenkins repo
      apt:
        update_cache: yes

    - name: Install Jenkins package
      apt:
        name: jenkins
        state: present

    - name: Create systemd override directory for Jenkins
      file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure Jenkins to use minimal memory
      copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        content: |
          [Service]
          Environment="JAVA_OPTS=-Xmx256m -Xms128m -XX:+UseG1GC"
        owner: root
        group: root
        mode: '0644'
      register: jenkins_override

    - name: Reload systemd daemon if override changed
      systemd:
        daemon_reload: yes
      when: jenkins_override.changed

    - name: Enable and start Jenkins service
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Wait for Jenkins to start up (HTTP 200/403)
      uri:
        url: "http://localhost:{{ jenkins_port }}/login"
        status_code: [200, 403]
      register: jenkins_web
      until: jenkins_web.status in [200, 403]
      retries: 24
      delay: 5

    - name: Retrieve Initial Admin Password
      slurp:
        src: /var/lib/jenkins/secrets/initialAdminPassword
      register: admin_password_slurp

    - name: Display Initial Admin Password
      debug:
        msg: "Jenkins Setup Completed! The initial administrator password is: {{ admin_password_slurp['content'] | b64decode | trim }}"
