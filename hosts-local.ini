# Local Laptop Ansible Inventory (uses Docker connection instead of SSH)

[staging]
tomcat_local ansible_connection=docker

[production]
tomcat_local ansible_connection=docker

[ecommerce_servers:children]
staging
production

[ecommerce_servers:vars]
# Override Tomcat paths to match the official Docker image structure
tomcat_service: dummy # No systemd inside the default Docker Tomcat image
tomcat_webapps_dir: /usr/local/tomcat/webapps
tomcat_owner: root
tomcat_group: root
backup_dir: /usr/local/tomcat/backups
app_port: 8080
health_check_url: "http://localhost:{{ app_port }}/{{ app_name }}/"
